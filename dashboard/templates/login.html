<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — Canal AI ダッシュボード</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#0d1117; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:2.5rem; width:100%; max-width:380px; }
    .form-control { background:#0d1117; border-color:#30363d; color:#e6edf3; }
    .form-control:focus { background:#0d1117; border-color:#58a6ff; color:#e6edf3; box-shadow:none; }
    .form-label { color:#8b949e; font-size:.85rem; }
    .btn-primary { background:#1f6feb; border-color:#1f6feb; }
    .btn-primary:hover { background:#388bfd; border-color:#388bfd; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div style="font-size:2rem;">🤖</div>
      <h5 class="mt-2 fw-bold" style="color:#e6edf3;">Canal AI 営業ダッシュボード</h5>
      <p class="text-muted mb-0" style="font-size:.85rem;">株式会社キャナルAI</p>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2 text-center" style="font-size:.85rem;">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">ユーザーID</label>
        <input type="text" name="username" class="form-control" placeholder="IDを入力" autofocus required autocomplete="username">
      </div>
      <div class="mb-3">
        <label class="form-label">パスワード</label>
        <input type="password" name="password" class="form-control" placeholder="パスワードを入力" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-1">ログイン</button>
    </form>
  </div>
</body>
</html>
